{% extends 'base.html' %}

{% block content %}
<div class="auth-card">
    <h2 class="typing-text" style="font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 0.5rem;">FORGOT</h2>
    <p style="color: var(--text-dim); margin-bottom: 3.5rem; font-size: 0.85rem; font-weight: 600; letter-spacing: 2px; opacity: 1; ">PASSWORD RECOVERY</p>
    
    <form method="POST">
        <div style="text-align: left; margin-bottom: 0.5rem;">
            <label for="username" style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.5rem;">ATHLETE ID</label>
        </div>
        <input type="text" id="username" name="username" class="premium-input" required placeholder="ENTER ID">

        <div style="text-align: left; margin-bottom: 0.5rem;">
            <label for="email" style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.5rem;">EMAIL ADDRESS</label>
        </div>
        <input type="email" id="email" name="email" class="premium-input" required placeholder="ENTER REGISTERED EMAIL">
        
        <button type="submit" class="premium-btn">SEND RECOVERY CODE</button>
    </form>

    <div style="margin-top: 3rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
        <p style="color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">REMEMBERED? <a href="{{ url_for('login') }}" class="circle-transition-link" style="color: var(--primary-orange); text-decoration: none; border-bottom: 1px solid var(--primary-orange);">BACK TO LOGIN</a></p>
    </div>
</div>
{% endblock %}

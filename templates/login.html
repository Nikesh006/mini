{% extends 'base.html' %}

{% block content %}
<div class="auth-card">
    <h2 class="typing-text" style="font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 0.5rem;">LOGIN</h2>
    <p style="color: var(--text-dim); margin-bottom: 3.5rem; font-size: 0.85rem; font-weight: 600; letter-spacing: 2px; opacity: 0; ">SECURE ACCESS HUB</p>
    
    <form method="POST">
        <div style="text-align: left; margin-bottom: 0.5rem;">
            <label for="username" style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.5rem;">ATHLETE ID</label>
        </div>
        <input type="text" id="username" name="username" class="premium-input" required placeholder="ENTER ID">
        
        <div style="text-align: left; margin-bottom: 0.5rem;">
            <label for="password" style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.5rem;">SECURE PASSCODE</label>
        </div>
        <div style="position: relative;">
            <input type="password" id="password" name="password" class="premium-input" required placeholder="ENTER PASSWORD">
            <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 20px; top: 18px; cursor: pointer; color: var(--text-dim); transition: 0.3s;" onclick="togglePasswordVisibility()"></i>
        </div>
        <div style="text-align: right; margin-top: -0.5rem; margin-bottom: 1.5rem;">
            <a href="{{ url_for('forgot_password') }}" style="color: var(--text-dim); font-size: 0.65rem; font-weight: 700; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;" onmouseover="this.style.color='var(--primary-orange)'" onmouseout="this.style.color='var(--text-dim)'">FORGOT SECURE PASSCODE?</a>
        </div>
        <button type="submit" class="premium-btn">INITIALIZE SESSION</button>
    </form>

    <div style="margin-top: 3rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
        <p style="color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">NEW ATHLETE? <a href="{{ url_for('register') }}" class="circle-transition-link" style="color: var(--primary-orange); text-decoration: none; border-bottom: 1px solid var(--primary-orange);">REGISTER PROFILE</a></p>
    </div>
</div>
{% endblock %}

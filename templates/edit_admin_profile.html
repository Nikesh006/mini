{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom: 3.5rem; ">
    <h1 style="font-size: 2.75rem; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 0.5rem; color: white;">ADMIN <span>RECONFIGURATION</span></h1>
    <p class="dashboard-subtitle">RECONFIGURING ADMINISTRATIVE PROFILE ARCHIVE</p>
</div>

<div style="display: flex; justify-content: center; ">
    <div class="data-card" style="width: 650px; padding: 4rem; background: var(--glass-card);">
        <form method="POST" enctype="multipart/form-data">
            <!-- Profile Picture Section -->
            <div style="margin-bottom: 3rem; text-align: center;">
                <label for="profile_pic" style="cursor: pointer; display: inline-block;">
                    <div style="width: 100px; height: 100px; background: rgba(255,255,255,0.03); border: 2px dashed var(--glass-border); border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; background-size: cover; background-position: center; {% if current_user.profile_pic and current_user.profile_pic != 'default.png' %} background-image: url('{{ url_for('static', filename='uploads/' + current_user.profile_pic) }}'); {% endif %}" id="pic-preview">
                        {% if not current_user.profile_pic or current_user.profile_pic == 'default.png' %}
                        <i class="fas fa-camera" style="font-size: 1.5rem; color: var(--text-secondary); margin-bottom: 8px;"></i>
                        <span style="font-size: 0.6rem; font-weight: 800; color: var(--text-dim); letter-spacing: 1px;">CHANGE PHOTO</span>
                        {% endif %}
                    </div>
                </label>
                <input type="file" id="profile_pic" name="profile_pic" style="display: none;" onchange="previewImage(this)">
            </div>

            <div style="margin-bottom: 2rem;">
                <label style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; display: block; margin-bottom: 1rem; text-transform: uppercase;">ADMIN USERNAME</label>
                <input type="text" name="username" class="premium-input" value="{{ current_user.username }}" required>
            </div>

            <div style="margin-bottom: 2rem;">
                <label style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; display: block; margin-bottom: 1rem; text-transform: uppercase;">AGE</label>
                <input type="number" name="age" id="age" class="premium-input" value="{{ current_user.age or '' }}" min="1" max="120">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem;">
                <div>
                    <label style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; display: block; margin-bottom: 1rem; text-transform: uppercase;">EMAIL ADDRESS</label>
                    <input type="email" name="email" class="premium-input" value="{{ current_user.email }}" required>
                </div>
                <div>
                    <label style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; display: block; margin-bottom: 1rem; text-transform: uppercase;">CONTACT NUMBER</label>
                    <input type="tel" name="phone" class="premium-input" value="{{ current_user.phone or '' }}" pattern="[0-9]{10}" maxlength="10" placeholder="10-DIGIT NUMBER" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>

            <div style="display: flex; gap: 2rem; align-items: center; margin-top: 3rem;">
                <button type="submit" class="premium-btn" style="flex-grow: 1;">SAVE ARCHIVE</button>
                <a href="{{ url_for('settings') }}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;">DISCARD</a>
            </div>
        </form>
    </div>
</div>

<script>
    function previewImage(input) {
        const preview = document.getElementById('pic-preview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.style.backgroundImage = `url(${e.target.result})`;
                preview.style.backgroundSize = 'cover';
                preview.style.backgroundPosition = 'center';
                preview.style.borderStyle = 'solid';
                preview.style.borderColor = 'var(--primary-orange)';
                preview.innerHTML = '';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}

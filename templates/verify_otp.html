{% extends 'base.html' %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="card" style="max-width: 500px; width: 100%; padding: 3rem; border-radius: 30px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);">
                <i class="fas fa-shield-alt" style="color: white; font-size: 2rem;"></i>
            </div>
            <h2 style="font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 0.5rem;">EMAIL VERIFICATION</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem;">We've sent a 6-digit security code to your email. Please enter it below to authorize your registration.</p>
        </div>

        <form method="POST">
            <div style="margin-bottom: 2rem;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: #3b82f6; letter-spacing: 1.5px; margin-bottom: 0.75rem; text-transform: uppercase;">Security OTP Code</label>
                <input type="text" name="otp" required maxlength="6" inputmode="numeric" pattern="[0-9]{6}" placeholder="000000" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6)" style="width: 100%; padding: 1.2rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; color: white; font-size: 1.5rem; letter-spacing: 10px; text-align: center; transition: 0.3s; font-weight: 700;">
            </div>

            <button type="submit" class="premium-btn" style="width: 100%; padding: 1.2rem; border-radius: 15px; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <span>VERIFY & CONTINUE</span> <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center;">
            <p style="color: var(--text-dim); font-size: 0.85rem;">Didn't receive the code? <a href="{{ url_for('resend_otp') }}" style="color: #3b82f6; text-decoration: none; font-weight: 700;">Resend OTP</a> or <a href="{{ url_for('register') }}" style="color: #3b82f6; text-decoration: none; font-weight: 700;">try again</a>.</p>
        </div>
    </div>
</div>
{% endblock %}

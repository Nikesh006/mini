{% extends 'base.html' %}

{% block content %}
<div class="auth-card">
    <h2 class="typing-text" style="font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 0.5rem;">RESET</h2>
    <p style="color: var(--text-dim); margin-bottom: 3.5rem; font-size: 0.85rem; font-weight: 600; letter-spacing: 2px; opacity: 1; ">INITIALIZE NEW SECURE PASSCODE</p>
    
    <form method="POST">
        <div style="text-align: left; margin-bottom: 0.5rem;">
            <label for="otp" style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.5rem;">VERIFICATION CODE</label>
        </div>
        <input type="text" id="otp" name="otp" class="premium-input" required placeholder="6-DIGIT CODE">

        <div style="text-align: left; margin-bottom: 0.5rem;">
            <label for="password" style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.5rem;">NEW SECURE PASSCODE</label>
        </div>
        <input type="password" id="password" name="password" class="premium-input" required placeholder="ENTER NEW PASSWORD">

        <div style="text-align: left; margin-bottom: 0.5rem;">
            <label for="confirm_password" style="color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.5rem;">CONFIRM PASSCODE</label>
        </div>
        <input type="password" id="confirm_password" name="confirm_password" class="premium-input" required placeholder="REPEAT NEW PASSWORD">
        
        <button type="submit" class="premium-btn">FINALIZE RESET</button>
    </form>

    <div style="margin-top: 3rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
        <p style="color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">ISSUE PERSISTS? <a href="{{ url_for('login') }}" class="circle-transition-link" style="color: var(--primary-orange); text-decoration: none; border-bottom: 1px solid var(--primary-orange);">BACK TO LOGIN</a></p>
    </div>
</div>
{% endblock %}
